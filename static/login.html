<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <title>Đăng nhập · HashTag AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="https://idea.tp.com.vn/favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/static/css/styles.css?v=1.0.1" />
  <style>
    .login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-muted);
      border-radius: 16px;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }
    .login-card h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }
    .login-card .sub {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .login-card .btn-google {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 20px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-muted);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .login-card .btn-google:hover {
      background: var(--bg-hover);
      border-color: var(--border-accent);
    }
    .login-card .error {
      margin-top: 1rem;
      padding: 10px 12px;
      background: rgba(244, 63, 94, 0.12);
      border: 1px solid rgba(244, 63, 94, 0.3);
      border-radius: 8px;
      color: var(--danger);
      font-size: 0.9rem;
    }
    .login-card .logo-mark {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
  </style>
</head>

<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="logo-mark">✦</div>
      <h1>HashTag AI</h1>
      <p class="sub">Đăng nhập bằng tài khoản Google @tp.com.vn để sử dụng.</p>
      <a href="/auth/google" class="btn-google" id="btnGoogle">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Đăng nhập bằng Google
      </a>
      <div id="errorBox" class="error" style="display: none;"></div>
    </div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var error = params.get('error');
      var msg = '';
      if (error === 'domain') msg = 'Chỉ tài khoản email @tp.com.vn được phép truy cập.';
      else if (error === 'denied') msg = 'Bạn đã hủy đăng nhập.';
      else if (error === 'no_code' || error === 'token_failed' || error === 'no_token' || error === 'userinfo_failed') msg = 'Đăng nhập thất bại. Vui lòng thử lại.';
      if (msg) {
        var box = document.getElementById('errorBox');
        box.textContent = msg;
        box.style.display = 'block';
      }
    })();
  </script>
</body>

</html>
